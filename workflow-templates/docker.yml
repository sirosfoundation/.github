# Standard Docker build workflow for sirosfoundation repos.
# Builds on PRs (no push), pushes on main and semver tags.
#
# Customize:
#   - image-name: your GHCR image path
#   - Add build-args, change platforms, or override tags as needed
#   - See https://github.com/sirosfoundation/.github/blob/main/.github/workflows/docker-build-push.yml
#
name: Docker

on:
  push:
    branches: [$default-branch]
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  pull_request:
    branches: [$default-branch]

jobs:
  docker:
    uses: sirosfoundation/.github/.github/workflows/docker-build-push.yml@main
    permissions:
      contents: read
      packages: write
    with:
      image-name: sirosfoundation/${{ github.event.repository.name }}
