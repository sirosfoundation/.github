# Reusable SBOM Generation Workflow
# https://github.com/sirosfoundation/.github
#
# Usage in your repository:
#   jobs:
#     sbom:
#       uses: sirosfoundation/.github/.github/workflows/sbom.yml@main
#       with:
#         artifact-name: myproject
#         sign-sbom: true  # optional
#       permissions:
#         contents: write        # Required for release attachment
#         id-token: write        # Required for Cosign keyless signing
#         security-events: write # Required for SARIF upload
#
# Security note: Third-party actions are pinned to commit SHAs for supply-chain security.
# GitHub-maintained actions (actions/*) use major version tags for faster security updates.
# When updating pinned actions, verify the SHA matches the expected release tag.
#
name: Generate SBOM

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name prefix for SBOM artifact (default: repo name)'
        type: string
        required: false
        default: ''
      scan-image:
        description: 'Container image to scan (optional, for container SBOM)'
        type: string
        required: false
        default: ''
      scan-vulnerabilities:
        description: 'Scan SBOM for vulnerabilities using Grype'
        type: boolean
        required: false
        default: true
      fail-on-severity:
        description: 'Fail build if vulnerabilities at this severity or higher (negligible, low, medium, high, critical)'
        type: string
        required: false
        default: ''
      sign-sbom:
        description: 'Sign SBOM with Cosign (keyless)'
        type: boolean
        required: false
        default: false
      upload-to-release:
        description: 'Attach SBOM to GitHub release (when triggered by release)'
        type: boolean
        required: false
        default: true
      require-sbom:
        description: 'Fail workflow if SBOM generation fails (for release gating)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  id-token: write  # For Cosign keyless signing
  security-events: write  # For uploading SARIF vulnerability results

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine artifact name
        id: name
        run: |
          if [[ -n "${{ inputs.artifact-name }}" ]]; then
            raw_name="${{ inputs.artifact-name }}"
          else
            raw_name="${{ github.event.repository.name }}"
          fi
          # Sanitize: only allow alphanumeric, dots, underscores, hyphens
          safe_name="${raw_name//[^A-Za-z0-9._-]/-}"
          # Strip leading dashes to prevent argument injection
          safe_name="${safe_name##-}"
          echo "name=${safe_name}" >> "$GITHUB_OUTPUT"

      - name: Generate Source SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        id: sbom
        with:
          format: cyclonedx-json
          output-file: ${{ steps.name.outputs.name }}-sbom.cdx.json
        continue-on-error: ${{ !inputs.require-sbom }}

      - name: Generate Container SBOM
        if: inputs.scan-image != ''
        id: container-sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ inputs.scan-image }}
          format: cyclonedx-json
          output-file: ${{ steps.name.outputs.name }}-container-sbom.cdx.json
        continue-on-error: ${{ !inputs.require-sbom }}

      - name: Scan SBOM for vulnerabilities
        if: inputs.scan-vulnerabilities && steps.sbom.outcome == 'success'
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: vuln-scan
        with:
          sbom: ${{ steps.name.outputs.name }}-sbom.cdx.json
          fail-build: ${{ inputs.fail-on-severity != '' }}
          severity-cutoff: ${{ inputs.fail-on-severity || 'negligible' }}
          output-format: sarif

      - name: Upload vulnerability scan results
        if: inputs.scan-vulnerabilities && steps.sbom.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.vuln-scan.outputs.sarif }}
        continue-on-error: true

      - name: Install Cosign
        if: inputs.sign-sbom
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign Source SBOM
        if: inputs.sign-sbom && steps.sbom.outcome == 'success'
        run: |
          cosign sign-blob --yes \
            --output-signature ${{ steps.name.outputs.name }}-sbom.cdx.json.sig \
            --output-certificate ${{ steps.name.outputs.name }}-sbom.cdx.json.pem \
            ${{ steps.name.outputs.name }}-sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.name.outputs.name }}-sbom
          path: |
            ${{ steps.name.outputs.name }}-sbom.cdx.json
            ${{ steps.name.outputs.name }}-sbom.cdx.json.sig
            ${{ steps.name.outputs.name }}-sbom.cdx.json.pem
            ${{ steps.name.outputs.name }}-container-sbom.cdx.json
          if-no-files-found: ignore

      - name: Attach SBOM to Release
        if: startsWith(github.ref, 'refs/tags/') && inputs.upload-to-release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          files: |
            ${{ steps.name.outputs.name }}-sbom.cdx.json
            ${{ steps.name.outputs.name }}-sbom.cdx.json.sig
            ${{ steps.name.outputs.name }}-sbom.cdx.json.pem
            ${{ steps.name.outputs.name }}-container-sbom.cdx.json

      - name: SBOM Summary
        if: always()
        run: |
          echo "## SBOM Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ -f "${{ steps.name.outputs.name }}-sbom.cdx.json" ]]; then
            COMPONENTS=$(jq '.components | length' ${{ steps.name.outputs.name }}-sbom.cdx.json 2>/dev/null || echo "N/A")
            echo "✅ **Source SBOM generated**: ${{ steps.name.outputs.name }}-sbom.cdx.json" >> $GITHUB_STEP_SUMMARY
            echo "   - Components: $COMPONENTS" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Source SBOM**: Not generated" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -f "${{ steps.name.outputs.name }}-container-sbom.cdx.json" ]]; then
            echo "✅ **Container SBOM generated**: ${{ steps.name.outputs.name }}-container-sbom.cdx.json" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "${{ inputs.scan-vulnerabilities }}" == "true" ]]; then
            if [[ "${{ steps.vuln-scan.outcome }}" == "success" ]]; then
              echo "✅ **Vulnerability scan**: Passed" >> $GITHUB_STEP_SUMMARY
            elif [[ "${{ steps.vuln-scan.outcome }}" == "failure" ]]; then
              echo "❌ **Vulnerability scan**: Failed (severity threshold: ${{ inputs.fail-on-severity }})" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ **Vulnerability scan**: Skipped" >> $GITHUB_STEP_SUMMARY
            fi
            echo "   - [View results in Security tab](../security/code-scanning)" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -f "${{ steps.name.outputs.name }}-sbom.cdx.json.sig" ]]; then
            echo "✅ **Signature**: Cosign keyless" >> $GITHUB_STEP_SUMMARY
          fi
