# Reusable Docker Build & Push Workflow
# https://github.com/sirosfoundation/.github
#
# Builds a Docker image using Buildx and pushes to GHCR.
# Includes Trivy CVE scanning of the built image (results in GitHub Security tab).
# Encapsulates the standard tag policy, multi-platform builds, and caching.
#
# Trust model:
#   - Pushes, tags, and workflow_dispatch: always run
#   - PRs from same repo (org members): always run
#   - PRs from forks (external contributors): require 'safe-to-build' label
#
# Standard usage (Go or Node project with single Dockerfile):
#
#   on:
#     push:
#       branches: [main]
#       tags: ['v[0-9]+.[0-9]+.[0-9]+*']
#     pull_request:
#       branches: [main]
#
#   jobs:
#     docker:
#       uses: sirosfoundation/.github/.github/workflows/docker-build-push.yml@main
#       permissions:
#         contents: read
#         packages: write
#         security-events: write   # Required for Trivy SARIF upload
#       with:
#         image-name: sirosfoundation/my-service
#
# Multi-image repo (multiple Dockerfiles):
#
#   jobs:
#     server:
#       uses: sirosfoundation/.github/.github/workflows/docker-build-push.yml@main
#       permissions:
#         contents: read
#         packages: write
#         security-events: write
#       with:
#         image-name: sirosfoundation/my-server
#         dockerfile: ./Dockerfile
#
#     admin:
#       uses: sirosfoundation/.github/.github/workflows/docker-build-push.yml@main
#       permissions:
#         contents: read
#         packages: write
#         security-events: write
#       with:
#         image-name: sirosfoundation/my-admin
#         dockerfile: ./Dockerfile.admin
#
# Custom tag policy (e.g. wallet-frontend):
#
#   jobs:
#     docker:
#       uses: sirosfoundation/.github/.github/workflows/docker-build-push.yml@main
#       permissions:
#         contents: read
#         packages: write
#         security-events: write
#       with:
#         image-name: sirosfoundation/wallet-frontend
#         platforms: linux/amd64
#         tags: |
#           type=semver,pattern={{version}}
#           type=raw,value=latest,enable=${{ contains(github.ref, '-sirosid.') }}
#           type=raw,value=unstable,enable=${{ github.ref == 'refs/heads/release/sirosid' }}
#           type=sha,prefix=unstable-,enable=${{ github.ref == 'refs/heads/release/sirosid' }}
#
# Manual dispatch (workflow_dispatch) with custom ref/tag:
#
#   on:
#     workflow_dispatch:
#       inputs:
#         git_ref:
#           description: 'Git ref to build'
#           required: true
#           default: 'main'
#         image_tag:
#           description: 'Custom image tag'
#           required: false
#
#   jobs:
#     docker:
#       uses: sirosfoundation/.github/.github/workflows/docker-build-push.yml@main
#       permissions:
#         contents: read
#         packages: write
#         security-events: write
#       with:
#         image-name: sirosfoundation/my-service
#         custom-ref: ${{ inputs.git_ref }}
#         custom-tag: ${{ inputs.image_tag }}
#
name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      image-name:
        description: 'GHCR image name without registry prefix (e.g. sirosfoundation/go-trust)'
        type: string
        required: true
      dockerfile:
        description: 'Path to Dockerfile'
        type: string
        required: false
        default: './Dockerfile'
      context:
        description: 'Docker build context path'
        type: string
        required: false
        default: '.'
      platforms:
        description: 'Target platforms (comma-separated)'
        type: string
        required: false
        default: 'linux/amd64,linux/arm64'
      build-args:
        description: 'Docker build arguments (multiline KEY=VALUE)'
        type: string
        required: false
        default: ''
      tags:
        description: 'Override default metadata-action tags config. Leave empty to use standard policy.'
        type: string
        required: false
        default: ''
      custom-ref:
        description: 'Custom git ref to checkout (for workflow_dispatch builds)'
        type: string
        required: false
        default: ''
      custom-tag:
        description: 'Custom image tag, bypasses metadata-action (for workflow_dispatch builds)'
        type: string
        required: false
        default: ''
      trivy-scan:
        description: 'Enable Trivy CVE scanning of the built image'
        type: boolean
        required: false
        default: true
      trivy-vex-url:
        description: 'URL to an org-level OpenVEX document. Downloaded and merged with any repo-level .trivyvex.openvex.json.'
        type: string
        required: false
        default: 'https://raw.githubusercontent.com/sirosfoundation/.github/main/vex/org.openvex.json'
      push-pr-images:
        description: 'Push images for PR builds (tagged pr-<N>). Only same-repo PRs from org members; fork PRs never push.'
        type: boolean
        required: false
        default: false
      sigsum-sign:
        description: 'Sign the image digest with Ed25519 (YubiHSM2) and submit to Sigsum. Requires self-hosted signer runner.'
        type: boolean
        required: false
        default: true
      sigsum-policy:
        description: 'Sigsum trust policy name'
        type: string
        required: false
        default: 'sigsum-generic-2025'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      pushed: ${{ steps.push-gate.outputs.push }}
      image-tags: ${{ steps.dispatch-tag.outputs.tags || steps.meta-custom.outputs.tags || steps.meta-standard.outputs.tags }}
    # Trust gate: run automatically for pushes, tags, dispatches, and same-repo PRs.
    # Fork PRs require the 'safe-to-build' label (only org members can apply it).
    # Fork PRs NEVER get images pushed, even with push-pr-images enabled.
    if: >-
      !startsWith(github.ref, 'refs/pull/')
      || github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
      || contains(github.event.pull_request.labels.*.name, 'safe-to-build')
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.custom-ref || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine if push is allowed
        id: push-gate
        run: |
          IS_PR=${{ startsWith(github.ref, 'refs/pull/') }}
          IS_SAME_REPO=${{ github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name || '' }}
          PUSH_PR=${{ inputs.push-pr-images }}
          if [[ "$IS_PR" == "true" ]]; then
            if [[ "$PUSH_PR" == "true" && "$IS_SAME_REPO" == "true" ]]; then
              echo "push=true" >> "$GITHUB_OUTPUT"
            else
              echo "push=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container Registry
        if: steps.push-gate.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute custom dispatch tag
        id: dispatch-tag
        if: inputs.custom-tag != ''
        run: |
          # Sanitize the custom tag for Docker compatibility
          SAFE_TAG=$(echo "${{ inputs.custom-tag }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9._-]/-/g' \
            | sed 's/[-._]\{2,\}/-/g' \
            | sed 's/^[-._]\+//; s/[-._]\+$//' \
            | cut -c1-128 \
          )
          if [[ -z "$SAFE_TAG" ]]; then
            echo "::error::custom-tag '${{ inputs.custom-tag }}' sanitized to empty string"
            exit 1
          fi
          echo "tags=ghcr.io/${{ inputs.image-name }}:${SAFE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (standard tag policy)
        id: meta-standard
        if: inputs.custom-tag == '' && inputs.tags == ''
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ inputs.image-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=semver,pattern=latest
            type=raw,value=latest-build,enable={{is_default_branch}}

      - name: Extract metadata (custom tag policy)
        id: meta-custom
        if: inputs.custom-tag == '' && inputs.tags != ''
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ inputs.image-name }}
          tags: ${{ inputs.tags }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ steps.push-gate.outputs.push == 'true' }}
          tags: ${{ steps.dispatch-tag.outputs.tags || steps.meta-custom.outputs.tags || steps.meta-standard.outputs.tags }}
          labels: ${{ steps.meta-custom.outputs.labels || steps.meta-standard.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Trivy CVE scanning ---

      - name: Build scan image (non-pushed builds only)
        if: inputs.trivy-scan && steps.push-gate.outputs.push != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: ${{ inputs.image-name }}:trivy-scan
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha

      - name: Determine Trivy scan target
        id: trivy-target
        if: inputs.trivy-scan
        run: |
          if [[ "${{ steps.push-gate.outputs.push }}" != "true" ]]; then
            echo "image-ref=${{ inputs.image-name }}:trivy-scan" >> "$GITHUB_OUTPUT"
          else
            # Scan the first tag from the pushed image
            FIRST_TAG=$(echo '${{ steps.dispatch-tag.outputs.tags || steps.meta-custom.outputs.tags || steps.meta-standard.outputs.tags }}' | head -1)
            echo "image-ref=${FIRST_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download VEX documents
        id: vex
        if: inputs.trivy-scan
        run: |
          VEX_ARGS=""
          # Download org-level VEX (non-fatal if missing)
          if [[ -n "${{ inputs.trivy-vex-url }}" ]]; then
            if curl -fsSL -o org.openvex.json "${{ inputs.trivy-vex-url }}" 2>/dev/null; then
              echo "Downloaded org-level VEX from ${{ inputs.trivy-vex-url }}"
              VEX_ARGS="org.openvex.json"
            else
              echo "::warning::Org-level VEX not found at ${{ inputs.trivy-vex-url }} — skipping"
            fi
          fi
          # Check for repo-level VEX (committed to the repo)
          if [[ -f ".trivyvex.openvex.json" ]]; then
            echo "Found repo-level VEX: .trivyvex.openvex.json"
            VEX_ARGS="${VEX_ARGS:+$VEX_ARGS,}.trivyvex.openvex.json"
          fi
          echo "vex-args=${VEX_ARGS}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scan
        if: inputs.trivy-scan
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_VEX: ${{ steps.vex.outputs.vex-args }}
        with:
          image-ref: ${{ steps.trivy-target.outputs.image-ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        if: inputs.trivy-scan && !cancelled()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

  # --- Sigsum image digest signing ---
  # Signs the pushed image digest with Ed25519 (YubiHSM2) and submits to Sigsum.
  # Runs on the self-hosted signer runner. Only runs for pushed images (not PR builds).
  # The proof artifact can be used for offline verification by anyone with the public key.
  sign-image:
    needs: build-and-push
    if: inputs.sigsum-sign && needs.build-and-push.outputs.pushed == 'true' && needs.build-and-push.outputs.digest != ''
    runs-on: [self-hosted, signer]

    steps:
      - name: Sign image digest and submit to Sigsum
        run: |
          # The image digest from docker/build-push-action is "sha256:<hex>"
          DIGEST="${{ needs.build-and-push.outputs.digest }}"
          DIGEST_HEX="${DIGEST#sha256:}"

          echo "Signing image digest: $DIGEST"
          echo "Image: ${{ inputs.image-name }}"

          # sigsum-submit --raw-hash takes a 64-char hex string (32 bytes),
          # signs it with the Ed25519 key via ssh-agent (backed by YubiHSM2),
          # and submits to the Sigsum transparency log.
          echo -n "$DIGEST_HEX" | sigsum-submit --raw-hash \
            -k "$HOME/.sigsum/signing-key" \
            -P "${{ inputs.sigsum-policy }}" \
            -o sigsum-image.proof

          echo "Sigsum proof written"

      - name: Upload Sigsum proof
        uses: actions/upload-artifact@v4
        with:
          name: sigsum-image-proof
          path: sigsum-image.proof
          retention-days: 90
